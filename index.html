<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev AI Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #030303;
      }
      html {
        scroll-behavior: smooth;
        background-color: var(--bg-color);
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: #ffffff;
        margin: 0;
        overflow-x: hidden;
      }
      .loader {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-bottom-color: #8b5cf6;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .noise-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.03;
        z-index: 50; /* Lowered from 9999 to stay behind modals */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      @keyframes spotlight {
        0% { opacity: 0; transform: translate(-72%, -62%) scale(0.5); }
        100% { opacity: 1; transform: translate(-50%,-40%) scale(1); }
      }
      .animate-spotlight {
        animation: spotlight 2s ease .75s 1 forwards;
      }
      
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #030303;
      }
      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "framer-motion": "https://esm.sh/framer-motion@11.11.17?bundle&deps=react@19.0.0",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0?deps=react@19.0.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.6.0",
    "clsx": "https://esm.sh/clsx@2.1.1",
    "@splinetool/react-spline": "https://esm.sh/@splinetool/react-spline@4.0.0?deps=react@19.0.0,react-dom@19.0.0",
    "class-variance-authority": "https://esm.sh/class-variance-authority@0.7.1",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@1.1.2?deps=react@19.0.0",
    "@radix-ui/react-accordion": "https://esm.sh/@radix-ui/react-accordion@1.2.3?deps=react@19.0.0",
    "@google/genai": "https://esm.sh/@google/genai@0.2.1",
    "appwrite": "https://esm.sh/appwrite@14.0.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  </head>
  <body>
    <div class="noise-bg"></div>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
