<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev AI Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #030303;
        color: #ffffff;
        margin: 0;
        overflow-x: hidden;
      }
      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #FFF;
        border-bottom-color: transparent;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spotlight {
        0% { opacity: 0; transform: translate(-72%, -62%) scale(0.5); }
        100% { opacity: 1; transform: translate(-50%,-40%) scale(1); }
      }
      .animate-spotlight {
        animation: spotlight 2s ease .75s 1 forwards;
      }
      
      /* Accordion Animations */
      @keyframes accordion-down {
        from { height: 0; }
        to { height: var(--radix-accordion-content-height); }
      }
      @keyframes accordion-up {
        from { height: var(--radix-accordion-content-height); }
        to { height: 0; }
      }
      .data-[state=open]:animate-accordion-down {
        animation: accordion-down 0.2s ease-out;
      }
      .data-[state=closed]:animate-accordion-up {
        animation: accordion-up 0.2s ease-out;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",

    "lucide-react": "https://esm.sh/lucide-react@0.475.0?deps=react@19.0.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.6.0",
    "clsx": "https://esm.sh/clsx@2.1.1",
    "@splinetool/react-spline": "https://esm.sh/@splinetool/react-spline@4.0.0?deps=react@19.0.0,react-dom@19.0.0",
    "class-variance-authority": "https://esm.sh/class-variance-authority@0.7.1",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@1.1.2?deps=react@19.0.0",
    "@radix-ui/react-accordion": "https://esm.sh/@radix-ui/react-accordion@1.2.3?deps=react@19.0.0",
